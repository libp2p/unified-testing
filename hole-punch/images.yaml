# Hole Punch Interop - Implementation Definitions
# This file defines all implementations to test for hole punching interoperability

# Test Aliases - Define reusable patterns for test selection
# Usage: --test-select "~linux" or --test-ignore "!~linux"
test-aliases:
  - alias: "nim"
    value: "nim-v1.15"
  - alias: "failing"
    value: "rust-v0.56 x rust-v0.56"

# Router configurations - Multiple router types for testing different NAT implementations
routers:
  - id: linux
    source:
      type: local
      path: images/linux
      dockerfile: Dockerfile

# Relay configurations - Multiple relay types for testing different implementations
relays:
  - id: rust-v0.56
    source:
      type: local
      path: images/rust/v0.56
      dockerfile: Dockerfile.relay
    # webrtc-direct removed: broken in this version (SRTP key length mismatch, see #20).
    # Fixed upstream in webrtc-rs/webrtc#677. Re-enable when rust-libp2p cuts a new release with the fix.
    transports: [quic-v1, tcp, ws]
    secureChannels: [noise, tls]
    muxers: [yamux, mplex]

# Implementation definitions
implementations:
  - id: rust-v0.56
    source:
      type: local
      path: images/rust/v0.56
      dockerfile: Dockerfile.peer
    # webrtc-direct removed: broken in this version (SRTP key length mismatch, see #20).
    # Fixed upstream in webrtc-rs/webrtc#677. Re-enable when rust-libp2p cuts a new release with the fix.
    transports: [quic-v1, tcp, ws]
    secureChannels: [noise, tls]
    muxers: [yamux, mplex]

  - id: nim-v1.15
    source:
      type: github
      repo: vacp2p/nim-libp2p
      commit: dcc37ca05fc95e25f3c8de9062d2afd241252ca8
      dockerfile: interop/hole-punching/Dockerfile
    transports: [tcp]
    secureChannels: [noise]
    muxers: [yamux, mplex]
