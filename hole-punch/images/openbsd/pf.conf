# NAT router for hole-punch interop tests
# vio0 = WAN, vio1 = LAN

set block-policy drop
set skip on lo

# NAT: rewrite LAN source to WAN IP (equivalent to iptables MASQUERADE)
match out on vio0 from vio1:network nat-to (vio0)

# Default: block everything
block all

# Allow all outbound traffic (stateful)
pass out all keep state

# Allow all traffic originating from LAN side
pass in on vio1 all keep state
