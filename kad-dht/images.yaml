# NOTE: Paths are relative to the kad-dht/ directory. Run via ./run.sh.
implementations:
  - id: py
    imageName: kad-dht-py
    buildContext: ./images/py
    dockerfile: Dockerfile
  - id: dotnet
    imageName: kad-dht-dotnet
    buildContext: ./images/dotnet
    dockerfile: Dockerfile
    source:
      type: github
      repo: NethermindEth/dotnet-libp2p
      commit: 960726885ca467fd2205bbb0fa4821a34b9e8f31
      vendorDir: dotnet-libp2p
      patchPath: images/dotnet
      patchFile: interop-fix.patch
  - id: nim
    imageName: kad-dht-nim
    # Dev: build a local nim-libp2p checkout. Before pushing, switch to
    #   source: { type: github, repo: vacp2p/nim-libp2p, commit: <sha>, dockerfile: interop/kad-dht-v2/Dockerfile }
    source:
      type: local
      path: /Users/radoslawkaminski/src/ift/nim-libp2p
      dockerfile: interop/kad-dht-v2/Dockerfile
